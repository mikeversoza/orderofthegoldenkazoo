<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Bingo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0d;
    --paper: #f5f0e8;
    --accent: #e8400c;
    --accent2: #1a6b3a;
    --stamp: #c8b89a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 48px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(0,0,0,0.04) 28px);
    pointer-events: none;
  }

  header { text-align: center; margin-bottom: 32px; }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(38px, 7.5vw, 72px);
    letter-spacing: 0.04em;
    line-height: 0.85;
    color: var(--ink);
    display: inline-block;
  }

  .logo span { color: var(--accent); }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: clamp(20px, 3.5vw, 30px);
    letter-spacing: 0.35em;
    color: var(--stamp);
    font-weight: 500;
    margin-top: 8px;
    display: block;
  }

  .g-red {
    color: var(--accent);
    font-family: 'Courier New', Courier, monospace;
    font-weight: 700;
  }

  .bingo-card {
    background: white;
    border: 3px solid var(--ink);
    box-shadow: 7px 7px 0 var(--ink);
    overflow: hidden;
    width: 100%;
    max-width: 680px;
    animation: appear 0.35s ease;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .card-header {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--ink);
  }

  .card-header .letter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 6vw, 52px);
    text-align: center;
    padding: 10px 4px;
    letter-spacing: 0.05em;
  }

  .card-header .letter:nth-child(1) { color: #fff; }
  .card-header .letter:nth-child(2) { color: #ffd166; }
  .card-header .letter:nth-child(3) { color: #a8dadc; }
  .card-header .letter:nth-child(4) { color: #c77dff; }
  .card-header .letter:nth-child(5) { color: #ff6b6b; }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
  }

  .bingo-cell {
    border: 1.5px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px 6px;
    font-size: clamp(8px, 1.1vw, 12px);
    font-family: 'DM Mono', monospace;
    min-height: 72px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s;
    line-height: 1.3;
    word-break: break-word;
    user-select: none;
  }

  .bingo-cell:hover { background: var(--paper); }

  .bingo-cell.free-space {
    background: var(--ink);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 2.2vw, 22px);
    letter-spacing: 0.08em;
    cursor: default;
  }

  .bingo-cell.free-space:hover { background: var(--ink); }

  .bingo-cell.marked::after {
    content: '';
    position: absolute;
    inset: 5px;
    background: var(--accent);
    opacity: 0.88;
    border-radius: 50%;
    pointer-events: none;
  }

  .bingo-cell.marked .cell-text {
    position: relative;
    z-index: 1;
    color: white;
    font-weight: 500;
  }

  .cell-text { pointer-events: none; }

  .card-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    width: 100%;
    max-width: 680px;
  }

  .btn-action {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--ink);
    background: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.1s;
  }

  .btn-action:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn-action:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn-action.new-card { background: var(--accent); color: white; }
  .btn-action.print { background: var(--accent2); color: white; }

  @media print {
    body { background: white; padding: 0; }
    body::before { display: none; }
    .card-actions { display: none !important; }
    .bingo-card { box-shadow: none; border: 2px solid black; max-width: 100%; }
    .bingo-cell.marked::after { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* ── CONGRATS MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,13,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    padding: 48px 40px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    transform: scale(0.85) translateY(20px);
    transition: transform 0.3s ease;
    position: relative;
  }

  .modal-overlay.show .modal {
    transform: scale(1) translateY(0);
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 80px);
    letter-spacing: 0.05em;
    line-height: 0.9;
    color: var(--ink);
  }

  .modal-title span { color: var(--accent); }

  .modal-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stamp);
    margin-top: 12px;
    margin-bottom: 32px;
  }

  .confetti-row {
    font-size: 28px;
    margin-bottom: 24px;
    letter-spacing: 4px;
  }

  .btn-modal {
    padding: 14px 32px;
    background: var(--accent);
    color: white;
    border: 2px solid var(--ink);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.1s;
    margin: 4px;
  }

  .btn-modal:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .btn-modal:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

  .btn-modal.secondary {
    background: white;
    color: var(--ink);
  }

  footer {
    margin-top: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--stamp);
    text-align: center;
    text-transform: uppercase;
  }

  footer a {
    color: var(--stamp);
    text-decoration: none;
    transition: color 0.15s;
  }

  footer a:hover { color: var(--accent); }

  /* ── PANIC MODAL ── */
  .panic-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,13,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .panic-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .panic-modal {
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    padding: 40px 36px 36px;
    width: 90%;
    max-width: 460px;
    transform: scale(0.88) translateY(16px);
    transition: transform 0.25s ease;
    position: relative;
  }

  .panic-overlay.show .panic-modal {
    transform: scale(1) translateY(0);
  }

  .panic-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .panic-sub {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stamp);
    margin-bottom: 24px;
    border-bottom: 1.5px solid var(--stamp);
    padding-bottom: 14px;
  }

  .panic-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .panic-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stamp);
  }

  .panic-input,
  .panic-textarea {
    background: white;
    border: 1.5px solid var(--stamp);
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .panic-input:focus,
  .panic-textarea:focus {
    border-color: var(--ink);
  }

  .panic-textarea {
    min-height: 110px;
    resize: vertical;
    line-height: 1.6;
  }

  .panic-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-panic-send {
    flex: 1;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: 2px solid var(--ink);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.1s;
  }

  .btn-panic-send:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn-panic-send:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  .btn-panic-cancel {
    padding: 13px 20px;
    background: white;
    color: var(--ink);
    border: 2px solid var(--ink);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.1s;
  }

  .btn-panic-cancel:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn-panic-cancel:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  .panic-sent {
    text-align: center;
    padding: 16px 0 8px;
    display: none;
  }

  .panic-sent .big { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--accent2); }
  .panic-sent p { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stamp); margin-top: 8px; }

</style>
</head>
<body>

<header>
  <div class="logo">Blackout at the Dehn</div>
  <div class="subtitle">BIN<span class="g-red">g</span>O</div>
</header>

<div class="bingo-card" id="bingoCard"></div>

<div class="card-actions">
  <button class="btn-action new-card" onclick="newCard()">NEW CARD</button>
  <button class="btn-action" onclick="clearMarks()">CLEAR MARKS</button>
  <button class="btn-action print" onclick="openPanic()">PANIC</button>
</div>

<script>
// Each entry: [text, weight] — weight 1=rare, 2=occasional, 3=common
// ── SQUARE TIERS ──────────────────────────────────────────────────────────────
// Adjust TIER_PCT to control how many of the 24 squares come from each tier.
// Values must add up to 1.0. Card always has 24 squares + 1 FREE center.
const TIER_PCT = {
  rare:     0.17,  // ~4  squares  — legendary moments
  occasional: 0.33, // ~8  squares  — happens sometimes
  common:   0.50,  // ~12 squares  — everyday bar life
};

// ── TIER 1 — RARE (legendary, almost never happens) ───────────────────────────
const RARE = [
  "Riegna throws an ashtray",
  "Scottie bites their date before the date bites her",
  "Having to call the cops",
  "Riegna gets in a fight",
  "Someone throws up",
  "Plugged toilet plunged by a non employee",
  "Nonregular finds notes in the owls ass",
  "Scottie shows her rib tattoo",
  "Someone melts their shoe on one of the fires",
  "Wingman shows up and hands out a business card",
  "Devon has phone service",
  "5 or more people come in wearing formal wear",
  "Comical amount of skiing supplies on the floor",
  "Shane and Laura show up at the same time",
  "Kristy comes in",
  "Two people trade clothes or accessories",
  "Someone plays instrument on patio when not everyone is digging it",
  "Animal transported not on a normal leash",
];

// ── TIER 2 — OCCASIONAL (happens a few times a week) ─────────────────────────
const OCCASIONAL = [
  "Someone falls off a barstool",
  "Someone ugly crying",
  "A non family member at family table",
  "Komo drinks a nutty russian for first shift drink",
  "Riegna says she wants to leave before cooking anything",
  "Mel has more than one drink",
  "Trash panda digs through garbage for a cigarette butt",
  "A non accidental glass break",
  "A regular gets cut off noticeably",
  "Bartender gives a free drink for doing a task",
  "Unintentional buttcrack 3+ inches with visible cheek",
  "Someone sits in a wet chair",
  "Someone is on an e-date (Tinder, Bumble, etc.)",
  "Someone asks Sasha about her weird colored drink",
  "Someone accidentally breaks a glass and tries to clean it up",
  "All three picnic tables filled at one time",
  "Gabs not wearing any red",
  "Scottie comes in wearing no leather",
  "Someone asks Scottie how they are and doesnt get all ten fingers all ten toes",
  "All Star plays naturally",
  "Someone complains about how the draft beer tastes",
  "An audience participation song comes on",
  "Someone mentions the previous Dehn iteration",
  "A bar mentioned that doesnt exist in Salem anymore",
  "Animal left in a car by someone inside the bar",
  "Rando tries to park in the bartender spot",
  "Having to unhook the chairs around the fire",
  "Fire isnt lit 2 hours past sunset",
  "Non-employee asks to go in the office",
  "Big Bang Theory, Ridiculousness or sports on the office TV",
  "More than three pigeons on the back patio",
  "An entire purse or backpack emptied on a table",
  "Unknown birthday announced by birthday person",
  "Someone orders bar food when Riegna is working",
  "3 or more people go for party favors",
  "3 or more people leaving to do karaoke",
  "When Leah laughs and snorts",
  "When someone sits in chair graveyard",
  "A person tries to park their bike awkwardly on the patio",
  "Getting a jello shot from someone you dont know",
  "Someone plays a song to annoy someone else",
  "You find something weird in the fire pit",
  "A regular brings leftovers from their job",
  "You hear someone say youve never seen X movie",
  "3 or more people woo at one time",
];

// ── TIER 3 — COMMON (happens most nights) ────────────────────────────────────
const COMMON = [
  "Hash plays Marty Robbins or Tom Waits",
  "Someone smokes weed on the patio not knowing its not allowed",
  "Regular here on a non regular day",
  "Regular comes back to the bar for a second time after leaving",
  "Nonregular thinks they have more pull than they do",
  "Someone bums more than 3 cigs with no money",
  "Lunch shots",
  "Someone is on a first date",
  "Asked for a device and its on the communal charging block",
  "Someone says they have to go move their car or pay for parking",
  "At least 3 dogs in the bar at one time",
  "Someone orders a titos and vodka",
  "Someone starts talking politics or religion",
  "A regular drags a chair and people cringe",
  "Asks for a cig then asks if its a menthol",
  "Someone asks if we are streaming a paid event",
  "An expensive item is left on the table by its owner",
  "Watering the plants gets mentioned",
  "A bartender called out for leaving with something important",
  "Someone asks if we have pool",
  "A person asks for the music to be turned up",
  "Obligatory partner shot",
  "Someone says be fun have safe",
  "Someone asks to use or share Touchtunes credits",
  "When a bartender asks someone to go get them food",
  "2 or more chairs moved by one party",
  "You cant sit here, a regular is coming back",
  "Bartender forgets about someones food order",
  "Holman guests come in for one drink and leave right away",
  "Ariel is not playing a game",
  "Dev doesnt have his tech deck with him",
];

// ── PICK FUNCTION ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickFromTier(arr, count) {
  return shuffle(arr).slice(0, Math.min(count, arr.length));
}

function weightedPick(n) {
  const nRare       = Math.round(n * TIER_PCT.rare);
  const nOccasional = Math.round(n * TIER_PCT.occasional);
  const nCommon     = n - nRare - nOccasional;

  const picked = [
    ...pickFromTier(RARE,       nRare),
    ...pickFromTier(OCCASIONAL, nOccasional),
    ...pickFromTier(COMMON,     nCommon),
  ];

  // If rounding left us short, top up from whichever tier has leftovers
  // (shouldn't normally happen but keeps card full)
  if (picked.length < n) {
    const used = new Set(picked);
    const all = shuffle([...RARE, ...OCCASIONAL, ...COMMON]);
    for (const item of all) {
      if (!used.has(item)) { picked.push(item); used.add(item); }
      if (picked.length === n) break;
    }
  }

  return shuffle(picked); // final shuffle so tiers are mixed on the card
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.addEventListener('beforeunload', function(e) {
  if (window._cardDirty) {
    e.preventDefault();
    e.returnValue = '';
  }
});

function newCard() {
  window._cardDirty = false;
  const items = weightedPick(24);
  const letters = ['B','I','N','G','O'];
  const card = document.getElementById('bingoCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  let cells = [];
  let idx = 0;
  for (let i = 0; i < 25; i++) {
    cells.push(i === 12 ? { free: true } : { text: items[idx++] });
  }

  card.innerHTML =
    '<div class="card-header">' + letters.map(l => '<div class="letter">'+l+'</div>').join('') + '</div>' +
    '<div class="card-grid">' +
    cells.map(cell => cell.free
      ? '<div class="bingo-cell free-space"><span class="cell-text">FREE</span></div>'
      : '<div class="bingo-cell" onclick="toggleMark(this)"><span class="cell-text">'+escHtml(cell.text)+'</span></div>'
    ).join('') +
    '</div>';
}


function toggleMark(el) {
  el.classList.toggle('marked');
  window._cardDirty = true;
  checkBlackout();
}

function checkBlackout() {
  const cells = document.querySelectorAll('.bingo-cell:not(.free-space)');
  const allMarked = [...cells].every(c => c.classList.contains('marked'));
  if (allMarked) {
    setTimeout(() => document.getElementById('modalOverlay').classList.add('show'), 300);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function clearMarks() {
  document.querySelectorAll('.bingo-cell.marked').forEach(c => c.classList.remove('marked'));
}

newCard();

function openPanic() {
  document.getElementById('panicForm').style.display = 'block';
  document.getElementById('panicSent').style.display = 'none';
  document.getElementById('panicName').value = '';
  document.getElementById('panicSubject').value = '';
  document.getElementById('panicMessage').value = '';
  document.getElementById('panicOverlay').classList.add('show');
}

function closePanic() {
  document.getElementById('panicOverlay').classList.remove('show');
}

function sendPanic() {
  const name    = document.getElementById('panicName').value.trim();
  const subject = document.getElementById('panicSubject').value.trim() || 'Bingo Feedback';
  const message = document.getElementById('panicMessage').value.trim();

  if (!message) {
    document.getElementById('panicMessage').focus();
    return;
  }

  const body = encodeURIComponent(
    (name ? 'From: ' + name + '\n\n' : '') + message
  );
  const sub = encodeURIComponent('[Blackout at the Dehn] ' + subject);

  window.location.href = 'mailto:Outerspacecrabs@gmail.com?subject=' + sub + '&body=' + body;

  setTimeout(() => {
    document.getElementById('panicForm').style.display = 'none';
    document.getElementById('panicSent').style.display = 'block';
  }, 400);
}

</script>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="confetti-row">🍺 🎉 🍺</div>
    <div class="modal-title">BLACK<span>OUT</span></div>
    <div class="modal-sub">Every square filled — you win the night</div>
    <div>
      <button class="btn-modal secondary" onclick="closeModal()">KEEP PLAYING</button>
      <button class="btn-modal" onclick="closeModal(); newCard()">NEW CARD</button>
    </div>
  </div>
</div>

<footer>
  Game designed by GrapeBiscuits &nbsp;<a href="secret.html">&copy;</a> 2026
</footer>

<div class="panic-overlay" id="panicOverlay">
  <div class="panic-modal">
    <div class="panic-title">PANIC</div>
    <div class="panic-sub">Send a suggestion or change request</div>

    <div id="panicForm">
      <div class="panic-field">
        <label class="panic-label">Your name (optional)</label>
        <input class="panic-input" id="panicName" type="text" placeholder="Who's asking...">
      </div>
      <div class="panic-field">
        <label class="panic-label">Subject</label>
        <input class="panic-input" id="panicSubject" type="text" placeholder="Add a square, fix something...">
      </div>
      <div class="panic-field">
        <label class="panic-label">Message</label>
        <textarea class="panic-textarea" id="panicMessage" placeholder="Tell us what you want changed or added..."></textarea>
      </div>
      <div class="panic-actions">
        <button class="btn-panic-cancel" onclick="closePanic()">CANCEL</button>
        <button class="btn-panic-send" onclick="sendPanic()">SEND IT</button>
      </div>
    </div>

    <div class="panic-sent" id="panicSent">
      <div class="big">SENT!</div>
